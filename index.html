<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VS Code練習</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 { color: #444; }
    h2 { color: #555; margin-top: 40px; }
    .todo-input {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .todo-input input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .todo-input input:focus { border-color: #6c8ebf; }
    .todo-input button {
      padding: 10px 20px;
      background: #6c8ebf;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .todo-input button:hover { background: #5a7db0; }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    li.done span { text-decoration: line-through; color: #aaa; }
    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #6c8ebf;
    }
    li span { flex: 1; font-size: 16px; }
    li button {
      padding: 4px 10px;
      background: #e57373;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    li button:hover { background: #c62828; }
    .empty { color: #aaa; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<h2>TODOリスト</h2>
<div class="todo-input">
  <input type="text" id="todoInput" placeholder="やることを入力..." />
  <button onclick="addTodo()">追加</button>
</div>
<ul id="todoList">
  <li class="empty" id="emptyMsg">まだタスクがありません</li>
</ul>

<script>
  const input = document.getElementById('todoInput');
  const list = document.getElementById('todoList');
  const emptyMsg = document.getElementById('emptyMsg');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;

    emptyMsg.style.display = 'none';

    const li = document.createElement('li');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.addEventListener('change', () => {
      li.classList.toggle('done', checkbox.checked);
    });

    const span = document.createElement('span');
    span.textContent = text;

    const btn = document.createElement('button');
    btn.textContent = '削除';
    btn.addEventListener('click', () => {
      li.remove();
      if (list.querySelectorAll('li:not(#emptyMsg)').length === 0) {
        emptyMsg.style.display = '';
      }
    });

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(btn);
    list.appendChild(li);

    input.value = '';
    input.focus();
  }
</script>

</body>
</html>
